<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - KrishiMitra 2.0</title>
    <link rel="stylesheet" href="styles.css">

    <!-- Modern Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        emerald: {
                            400: '#34d399',
                            500: '#10b981',
                            600: '#059669',
                            700: '#047857',
                            900: '#064e3b',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #ffffff; color: #111827; }
        .bg-green-brand { background-color: #14532d; }
        .input-field { background-color: #ffffff; border: 1px solid #d1d5db; border-radius: 0.5rem; transition: all 0.2s; }
        .input-field:focus { border-color: #10b981; box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.2); outline: none; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 bg-gray-50">
    <!-- Main Container -->
    <div class="flex flex-col md:flex-row w-full max-w-[1200px] h-auto min-h-[700px] bg-white rounded-3xl overflow-hidden shadow-2xl">
        
        <!-- Left Side: Illustration / Branding -->
        <div class="hidden md:flex md:w-1/2 bg-green-brand flex-col justify-between p-12 text-white relative overflow-hidden">
            <div class="absolute top-0 right-0 p-32 bg-emerald-700/30 rounded-full blur-3xl translate-x-1/2 -translate-y-1/2"></div>
            
            <div class="relative z-10 flex items-center gap-3">
                <div class="w-12 h-12 bg-white rounded-xl flex items-center justify-center text-2xl shadow-lg">🌱</div>
                <span class="text-2xl font-bold tracking-wide">KrishiMitra</span>
            </div>
            
            <div class="relative z-10 my-16">
                <!-- Farmer Illustration Mock -->
                <div class="w-full h-64 bg-emerald-800/50 rounded-2xl border border-white/10 flex items-center justify-center mb-10 overflow-hidden shadow-2xl backdrop-blur-sm">
                    <img src="https://images.unsplash.com/photo-1595841696677-6489ff3f8cd1?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" alt="Indian Farmer" class="w-full h-full object-cover mix-blend-overlay opacity-80 pl-4 pt-4">
                </div>
                
                <h1 class="text-5xl font-bold mb-4 leading-tight">Join the Farming<br>Revolution.</h1>
                <p class="text-emerald-100 text-lg">Create a KrishiMitra account and start unlocking AI-powered farming insights today.</p>
            </div>
            
            <div class="relative z-10 flex items-center gap-2 text-sm text-emerald-200">
                <div class="w-8 h-1 bg-emerald-500 rounded-full"></div>
                <span>Free for all Indian farmers</span>
            </div>
        </div>

        <!-- Right Side: Register Form -->
        <div class="w-full md:w-1/2 flex flex-col justify-center p-8 md:p-16 lg:p-20 relative overflow-y-auto">
            <!-- Language Selector (Top Right) -->
            <div class="absolute top-8 right-8">
                <select title="Preferred Language" aria-label="Preferred Language" class="bg-gray-50 border border-gray-200 text-sm rounded-lg focus:ring-emerald-500 focus:border-emerald-500 block w-full p-2.5">
                    <option value="en">🇺🇸 EN</option>
                    <option value="hi">🇮🇳 HI</option>
                    <option value="mr">🇮🇳 MR</option>
                </select>
            </div>

            <div class="mb-8 text-center md:text-left mt-8 md:mt-0">
                <h2 class="text-3xl font-bold text-gray-900 mb-2">Create an Account</h2>
                <p class="text-gray-500">Sign up to get started.</p>
            </div>
            
            <div class="space-y-6">
                <!-- Google Button -->
                <button onclick="registerWithGoogle()" class="w-full flex items-center justify-center gap-3 py-3 border border-gray-300 rounded-xl hover:bg-gray-50 transition-colors bg-white font-medium text-gray-700 shadow-sm">
                    <svg class="w-5 h-5" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Sign up with Google
                </button>

                <div class="relative flex items-center justify-center my-6">
                    <div class="border-t border-gray-200 w-full absolute"></div>
                    <span class="bg-white px-4 text-sm text-gray-500 z-10">or sign up with email</span>
                </div>

                <form id="registerForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">Full Name</label>
                        <input type="text" name="name" class="input-field w-full px-4 py-3" placeholder="Ramesh Kumar" required>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">Email Address</label>
                        <input type="email" name="email" class="input-field w-full px-4 py-3" placeholder="farmer@example.com" required>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">Password</label>
                        <input type="password" name="password" class="input-field w-full px-4 py-3" placeholder="••••••••" required>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">Confirm Password</label>
                        <input type="password" name="confirm_password" class="input-field w-full px-4 py-3" placeholder="••••••••" required>
                    </div>
                    
                    <button type="submit" class="w-full py-3.5 mt-2 bg-green-brand text-white font-semibold rounded-xl shadow-md hover:bg-emerald-800 transition-colors flex items-center justify-center">
                        Create Account
                    </button>
                </form>
                
                <p class="text-center text-sm text-gray-600 mt-6 md:mt-8">
                    Already have an account? 
                    <a href="login.html" class="text-emerald-600 font-bold hover:text-emerald-700 underline">Log in here</a>
                </p>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, db, doc, setDoc, serverTimestamp } from './firebase-config.js';
        
        window.registerWithGoogle = async function() {
            const { signInWithPopup, googleProvider } = await import('./firebase-config.js');
            try {
                const submitBtn = document.querySelector('button[type="submit"]');
                submitBtn.innerHTML = 'Signing up...';
                const result = await signInWithPopup(auth, googleProvider);
                
                // Save user profile
                await setDoc(doc(db, "users", result.user.uid), {
                    name: result.user.displayName || "Farmer",
                    email: result.user.email,
                    createdAt: serverTimestamp()
                }, { merge: true });
                
                window.location.href = 'dashboard.html';
            } catch (error) {
                alert('Google sign-up failed: ' + error.message);
                const submitBtn = document.querySelector('button[type="submit"]');
                submitBtn.innerHTML = 'Create Account';
            }
        }
        
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = e.target.name.value;
            const email = e.target.email.value;
            const password = e.target.password.value;
            const confirm_password = e.target.confirm_password.value;
            
            if (password !== confirm_password) {
                alert("Passwords do not match!");
                return;
            }
            
            const submitBtn = e.target.querySelector('button[type="submit"]');
            submitBtn.innerHTML = 'Creating account...';
            submitBtn.disabled = true;
            
            try {
                const { createUserWithEmailAndPassword, updateProfile } = await import('./firebase-config.js');
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                
                await updateProfile(userCredential.user, { displayName: name });
                
                // Save to Firestore
                await setDoc(doc(db, "users", userCredential.user.uid), {
                    name: name,
                    email: email,
                    createdAt: serverTimestamp()
                });
                
                window.location.href = 'dashboard.html';
            } catch (error) { 
                alert('Registration error: ' + error.message); 
                submitBtn.innerHTML = 'Create Account';
                submitBtn.disabled = false;
            }
        });
    </script>
    <script src="shared.js"></script>
</body>
</html>
